{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{.Title}} — EZyapper</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&amp;family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&amp;family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&amp;display=swap" rel="stylesheet">
	<link rel="stylesheet" href="/static/css/md3-tokens.css">
	<link rel="stylesheet" href="/static/css/md3-components.css">
	<link rel="stylesheet" href="/static/css/layout.css">
	<link rel="icon" href="/static/favicon.ico" type="image/svg+xml">
</head>
<body>
	<div class="md3-app">
		{{template "sidebar" .}}
		<main class="md3-main">
			{{if .Flash}}{{template "toast" .Flash}}{{end}}
			<div class="md3-page-header">
				<h1 class="md3-page-header__title">{{.Title}}</h1>
			</div>
			{{template "content" .}}
		</main>
	</div>
	<script src="/static/js/app.js" defer></script>
</body>
</html>{{end}}
