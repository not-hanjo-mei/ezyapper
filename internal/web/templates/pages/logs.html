{{define "content"}}
<div class="logs-toolbar">
	<label for="lines-input" class="md3-body-medium">Lines:</label>
	<input type="number" id="lines-input" class="md3-text-field" value="{{.Data.Lines}}" min="10" max="5000" step="1" style="width: 100px;">
	<button type="button" class="md3-btn md3-btn--filled" onclick="refreshLogs()">Refresh</button>
</div>

<div class="logs-stats">{{.Data.Stats}}</div>

<pre class="md3-log-viewer">{{.Data.Content}}</pre>

<script>
function refreshLogs() {
	var lines = document.getElementById("lines-input").value;
	var url = "/logs";
	if (lines && parseInt(lines) >= 10) {
		url += "?lines=" + parseInt(lines);
	}
	window.location.href = url;
}
</script>
{{end}}
